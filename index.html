<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Mabeyn Cafe Menü</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Mabeyn Cafe</h1>
    <nav>
      <a href="admin.html">Yönetici Girişi</a>
    </nav>
  </header>

  <main>
    <div id="menu-container"></div>
  </main>

  <script>
    window.onload = function() {
      let items = JSON.parse(localStorage.getItem('items')) || [];
      let container = document.getElementById('menu-container');

      if(items.length === 0){
        container.innerHTML = "<p>Henüz menüye ürün eklenmedi.</p>";
      } else {
        // Menüleri grupla
        let grouped = {};
        items.forEach(item => {
          if(!grouped[item.menu]) grouped[item.menu] = [];
          grouped[item.menu].push(item);
        });

        // Her menü için başlık ve ürün kartları
        for(let menuName in grouped){
          let section = document.createElement('section');
          section.innerHTML = `<h2>${menuName}</h2>`;
          
          let list = document.createElement('div');
          list.className = "menu-list";

          grouped[menuName].forEach(item => {
            let card = document.createElement('div');
            card.className = "menu-card";

            let content = `<strong>${item.name}</strong> - ${item.price}<br><small>${item.desc}</small>`;
            card.innerHTML = content;

            if(item.image){
              let img = document.createElement('img');
              img.src = item.image;
              img.className = "menu-img";
              card.appendChild(img);
            }

            list.appendChild(card);
          });

          section.appendChild(list);
          container.appendChild(section);
        }
      }
    };
  </script>
</body>
</html>
