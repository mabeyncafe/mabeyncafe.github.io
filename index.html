<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Mabeyn Cafe Menü</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Mabeyn Cafe</h1>
    <nav>
      <a href="admin.html">Yönetici Girişi</a>
    </nav>
  </header>

  <main>
    <div id="menu-container"></div>
  </main>

  <script>
    window.onload = function() {
      let items = JSON.parse(localStorage.getItem('items')) || [];
      let container = document.getElementById('menu-container');

      if(items.length === 0){
        container.innerHTML = "<p>Henüz menüye ürün eklenmedi.</p>";
      } else {
        let grouped = {};
        items.forEach(item => {
          if(!grouped[item.menu]) grouped[item.menu] = [];
          grouped[item.menu].push(item);
        });

        for(let menuName in grouped){
          let section = document.createElement('div');
          section.className = "accordion-section";

          let header = document.createElement('button');
          header.className = "accordion";
          header.innerText = menuName;
          section.appendChild(header);

          let panel = document.createElement('div');
          panel.className = "panel";

          grouped[menuName].forEach(item => {
            let card = document.createElement('div');
            card.className = "menu-card";
            card.innerHTML = `<strong>${item.name}</strong> - ${item.price}<br><small>${item.desc}</small>`;
            if(item.image){
              let img = document.createElement('img');
              img.src = item.image;
              img.className = "menu-img";
              card.appendChild(img);
            }
            panel.appendChild(card);
          });

          section.appendChild(panel);
          container.appendChild(section);
        }

        // Accordion davranışı
        let acc = document.getElementsByClassName("accordion");
        for (let i = 0; i < acc.length; i++) {
          acc[i].addEventListener("click", function() {
            this.classList.toggle("active");
            let panel = this.nextElementSibling;
            if (panel.style.display === "block") {
              panel.style.display = "none";
            } else {
              panel.style.display = "block";
            }
          });
        }
      }
    };
  </script>
</body>
</html>
