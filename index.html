<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Mabeyn Cafe Menü</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="logo.png" alt="Mabeyn Cafe Logo" class="logo">
    <h1>Mabeyn Cafe</h1>
    <hr>
  </header>

  <main>
    <div id="menu-container"></div>
  </main>

  <footer>
    <a href="admin.html" class="admin-link">Yönetici Girişi</a>
  </footer>

  <script>
    window.onload = function() {
      let items = JSON.parse(localStorage.getItem('items')) || [];
      let container = document.getElementById('menu-container');

      if(items.length === 0){
        container.innerHTML = "<p>Henüz menüye ürün eklenmedi.</p>";
      } else {
        let grouped = {};
        items.forEach(item => {
          if(!grouped[item.menu]) grouped[item.menu] = [];
          grouped[item.menu].push(item);
        });

        for(let menuName in grouped){
          let card = document.createElement('div');
          card.className = "menu-category";
          card.innerHTML = `<a href="${menuName}.html">${menuName}</a>`;
          container.appendChild(card);
        }
      }
    };
  </script>
</body>
</html>
