<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Yönetici Girişi - Mabeyn Cafe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <script defer>
    const VALID_USER = "mabeynyonetici";
    const VALID_PASS = "123Mabeyn";

    function handleLogin(e) {
      e.preventDefault();
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value.trim();
      const msg = document.getElementById("loginMessage");

      if (u === VALID_USER && p === VALID_PASS) {
        sessionStorage.setItem("mabeynLoggedIn", "1");
        window.location.href = "admin.html";
      } else {
        msg.textContent = "Kullanıcı adı veya şifre hatalı.";
      }
    }
  </script>
</head>

<body class="login-body">
  <div class="login-card">
    <h1>Mabeyn Cafe</h1>
    <h2>Yönetici Girişi</h2>

    <form onsubmit="handleLogin(event)">
      <label>Kullanıcı Adı</label>
      <input id="username" type="text">

      <label>Şifre</label>
      <input id="password" type="password">

      <button type="submit">Giriş Yap</button>
      <p id="loginMessage" class="login-message"></p>
    </form>

    <a href="index.html" class="back-link">← Menüyü Görüntüle</a>
  </div>
</body>
</html>
